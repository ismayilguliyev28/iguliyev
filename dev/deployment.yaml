apiVersion: apps/v1
kind: Deployment
metadata:
  name: will-playground
spec:
  selector:
    matchLabels:
      app: myapp
  replicas: 3
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
      - name: myapp
        image: wil42/playground:v2
        ports:
        - containerPort: 8888
